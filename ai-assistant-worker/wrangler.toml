name = "ai-lab-assistant"
main = "src/index.js"
compatibility_date = "2026-04-01"

rules = [
  { type = "Text", globs = ["**/*.md"], fallthrough = true }
]

[vars]
ALLOWED_ORIGINS = "https://ai-lab.co.il,https://www.ai-lab.co.il,http://localhost:8000,http://127.0.0.1:8000"

# ANTHROPIC_API_KEY is set via: wrangler secret put ANTHROPIC_API_KEY
